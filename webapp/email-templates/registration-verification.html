<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bevestig je e-mailadres - Umely</title>
</head>
<body style="margin:0;padding:0;background:#FFF8F2;font-family:'Helvetica Neue',Arial,sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" style="background:#FFF8F2;padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="560" cellpadding="0" cellspacing="0" style="max-width:560px;width:100%;">

          <!-- Header -->
          <tr>
            <td style="background:#27292D;border-radius:12px 12px 0 0;padding:32px 40px;text-align:center;">
              <div style="font-size:22px;font-weight:700;color:#FF8514;letter-spacing:1px;">UMELY</div>
              <div style="font-size:12px;color:#aaa;margin-top:4px;letter-spacing:2px;text-transform:uppercase;">E-learning</div>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="background:#ffffff;padding:40px 40px 32px;border-left:1px solid #eee;border-right:1px solid #eee;">
              <h1 style="margin:0 0 16px;font-size:24px;font-weight:700;color:#27292D;line-height:1.3;">
                Welkom bij Umely
              </h1>
              <p style="margin:0 0 24px;font-size:16px;color:#555;line-height:1.6;">
                Je account is aangemaakt. Bevestig je e-mailadres om toegang te krijgen tot de e-learning modules.
              </p>

              <!-- CTA Button -->
              <table cellpadding="0" cellspacing="0" style="margin:0 0 32px;">
                <tr>
                  <td style="border-radius:50px;background:#FF8514;">
                    <a href="{{ .ConfirmationURL }}"
                       style="display:inline-block;padding:16px 36px;font-size:16px;font-weight:600;color:#ffffff;text-decoration:none;border-radius:50px;letter-spacing:0.3px;background:#FF8514;mso-padding-alt:0;">
                      Bevestig mijn e-mailadres
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Divider info -->
          <tr>
            <td style="background:#f9f5f1;padding:24px 40px;border-left:1px solid #eee;border-right:1px solid #eee;">
              <p style="margin:0;font-size:13px;color:#999;line-height:1.7;">
                Deze link is 24 uur geldig. Heb je geen account aangemaakt bij Umely? Dan kun je deze e-mail negeren.
              </p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background:#27292D;border-radius:0 0 12px 12px;padding:24px 40px;text-align:center;">
              <p style="margin:0;font-size:12px;color:#666;line-height:1.7;">
                &copy; Umely &nbsp;&bull;&nbsp;
                <a href="https://umely.ai" style="color:#FF8514;text-decoration:none;">umely.ai</a>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
